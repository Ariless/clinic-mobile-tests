name: Mobile CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_smoke:
        description: "Run Appium smoke tests on Android emulator"
        type: boolean
        default: false
      run_smoke_ios:
        description: "Run Appium smoke tests on iOS Simulator"
        type: boolean
        default: false
      run_perf:
        description: "Run performance budget tests on Android emulator"
        type: boolean
        default: false
      run_mutation:
        description: "Run Stryker mutation tests against helper unit tests"
        type: boolean
        default: false

jobs:
  # ── Runs on every push and PR ──────────────────────────────────────────────
  static:
    name: Type check + Pact + AI properties
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript check
        run: npm run type-check

      - name: Pact consumer tests
        run: npm run test:pact

      - name: AI property tests
        run: npm run test:ai-properties
        env:
          ENABLE_AI_RECOMMENDATION: "true"
          AI_MOCK_RESPONSE: "true"

      - name: Helper unit tests
        run: npm run test:helpers

  # ── Mutation testing — workflow_dispatch only (slow: runs test suite per mutation) ──
  mutation:
    name: Stryker mutation score
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_mutation }}
    needs: static
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run Stryker
        run: npm run test:mutation

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report-${{ github.run_id }}
          path: stryker-report/
          retention-days: 30

  # ── Runs on workflow_dispatch only (slow: emulator + APK build) ───────────
  smoke:
    name: Smoke tests (Android emulator)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_smoke }}
    needs: static
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Build APK from clinic-mobile source
      - name: Checkout clinic-mobile
        uses: actions/checkout@v4
        with:
          repository: Ariless/clinic-mobile
          path: clinic-mobile-src

      - name: Install clinic-mobile deps
        run: npm ci
        working-directory: clinic-mobile-src

      - name: Prebuild Android native project
        run: npx expo prebuild --platform android --clean
        working-directory: clinic-mobile-src

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: clinic-mobile-src/android

      # Start SUT via Docker
      - name: Start SUT
        run: |
          docker compose -f ../sut/docker-compose.test.yml up -d --wait
        working-directory: clinic-mobile-src
        continue-on-error: true

      # Enable KVM for hardware-accelerated emulator
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Android emulator
        uses: reactivecircus/android-emulator-action@v4
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true

      - name: Install APK
        run: adb install clinic-mobile-src/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Install and start Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2
          appium --log-level error &
          sleep 8

      - name: Run smoke suite
        run: npm run test:smoke
        env:
          PLATFORM: android
          APPIUM_HOST: localhost
          APPIUM_PORT: "4723"
          APP_PACKAGE: com.anonymous.clinicmobile

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-android-${{ github.run_id }}
          path: allure-report/
          retention-days: 30

  # ── iOS smoke — workflow_dispatch only (macOS runner, ~25 min) ────────────
  smoke-ios:
    name: Smoke tests (iOS Simulator)
    runs-on: macos-14
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_smoke_ios }}
    needs: static
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Build .app from clinic-mobile source
      - name: Checkout clinic-mobile
        uses: actions/checkout@v4
        with:
          repository: Ariless/clinic-mobile
          path: clinic-mobile-src

      - name: Install clinic-mobile deps
        run: npm ci
        working-directory: clinic-mobile-src

      - name: Prebuild iOS native project
        run: npx expo prebuild --platform ios --clean
        working-directory: clinic-mobile-src

      - name: Build iOS Simulator app
        run: |
          xcodebuild \
            -workspace ios/clinicmobile.xcworkspace \
            -scheme clinicmobile \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -derivedDataPath build \
            build
        working-directory: clinic-mobile-src

      # Start SUT via Docker
      - name: Start SUT
        run: docker compose -f sut/docker-compose.test.yml up -d --wait
        working-directory: clinic-mobile-src
        continue-on-error: true

      # Boot simulator and install app
      - name: Boot iPhone 15 simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep 'iPhone 15 (' | head -1 | grep -oE '[A-F0-9-]{36}')
          echo "IOS_DEVICE_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Install app on simulator
        run: |
          APP_PATH=$(find clinic-mobile-src/build -name '*.app' | head -1)
          xcrun simctl install "$IOS_DEVICE_UDID" "$APP_PATH"

      - name: Install and start Appium
        run: |
          npm install -g appium
          appium driver install xcuitest
          appium --log-level error &
          sleep 8

      - name: Run smoke suite
        run: npm run test:smoke
        env:
          PLATFORM: ios
          APPIUM_HOST: localhost
          APPIUM_PORT: "4723"
          IOS_BUNDLE_ID: com.anonymous.clinicmobile

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-ios-${{ github.run_id }}
          path: allure-report/
          retention-days: 30

  # ── Performance budget — workflow_dispatch only (emulator, @perf tag) ────────
  perf:
    name: Performance budget (Android emulator)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_perf }}
    needs: static
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Checkout clinic-mobile
        uses: actions/checkout@v4
        with:
          repository: Ariless/clinic-mobile
          path: clinic-mobile-src

      - name: Install clinic-mobile deps
        run: npm ci
        working-directory: clinic-mobile-src

      - name: Prebuild Android native project
        run: npx expo prebuild --platform android --clean
        working-directory: clinic-mobile-src

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: clinic-mobile-src/android

      - name: Start SUT
        run: docker compose -f ../sut/docker-compose.test.yml up -d --wait
        working-directory: clinic-mobile-src
        continue-on-error: true

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Android emulator
        uses: reactivecircus/android-emulator-action@v4
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true

      - name: Install APK
        run: adb install clinic-mobile-src/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Install and start Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2
          appium --log-level error &
          sleep 8

      - name: Run performance suite
        run: npm run test:perf
        env:
          PLATFORM: android
          APPIUM_HOST: localhost
          APPIUM_PORT: "4723"
          APP_PACKAGE: com.anonymous.clinicmobile

      - name: Generate perf summary
        if: always()
        run: node scripts/perf-report.js

      - name: Upload perf summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-summary-${{ github.run_id }}
          path: perf-summary.json
          retention-days: 30

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-perf-${{ github.run_id }}
          path: allure-report/
          retention-days: 30
